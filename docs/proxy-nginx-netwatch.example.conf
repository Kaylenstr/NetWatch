# Nginx proxy example — replace YOUR_DOMAIN and UPSTREAM_IP with your values
# Add to nginx: /etc/nginx/sites-available/YOUR_DOMAIN
# ln -sf /etc/nginx/sites-available/YOUR_DOMAIN /etc/nginx/sites-enabled/
# nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name YOUR_DOMAIN;   # e.g. netwatch.example.com

    location / {
        proxy_pass http://UPSTREAM_IP:5000;   # IP of host running NetWatch
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
