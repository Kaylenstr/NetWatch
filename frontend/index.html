<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NetWatch</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<style>
:root {
  --bg:          #0d1117;
  --surface:     #161b22;
  --surface-2:   #1c2128;
  --border:      #30363d;
  --border-sub:  #21262d;
  --text:        #e6edf3;
  --text-muted:  #8b949e;
  --text-subtle: #484f58;
  --blue:        #3b82f6;
  --green:       #22c55e;
  --lime:        #84cc16;
  --yellow:      #f59e0b;
  --orange:      #f97316;
  --red:         #ef4444;
  --radius:      8px;
  --font:        'Inter', system-ui, sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

.app {
  display: grid;
  grid-template-rows: 56px 1fr 188px;
  grid-template-columns: var(--sidebar-width, 296px) 1fr;
  height: 100vh;
  transition: grid-template-columns 0.3s ease;
}

#dashboard {
  grid-row: 2 / 4;
  grid-column: 1 / -1;
  display: grid;
  grid-template-rows: 1fr 188px;
  grid-template-columns: var(--sidebar-width, 296px) 1fr;
  min-height: 0;
}

header {
  grid-column: 1 / -1;
  background: var(--surface);
  border-bottom: 1px solid var(--border-sub);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 24px;
  z-index: 100;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 15px;
  font-weight: 800;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text);
  flex-shrink: 0;
}

.logo-mark {
  width: 28px;
  height: 28px;
  border-radius: 6px;
  background: var(--blue);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.logo-mark svg { display: block; }

/* Header stat chips */
.header-chips {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.chip {
  padding: 4px 12px;
  border-radius: 100px;
  font-size: 12px;
  font-weight: 600;
  border: 1px solid var(--border-sub);
  background: var(--surface-2);
  color: var(--text-muted);
  letter-spacing: 0.02em;
  white-space: nowrap;
  transition: color .3s, border-color .3s, background .3s;
}
.chip.good   { color: var(--green);  border-color: rgba(34,197,94,.3);  background: rgba(34,197,94,.07); }
.chip.warn   { color: var(--yellow); border-color: rgba(245,158,11,.3); background: rgba(245,158,11,.07); }
.chip.bad    { color: var(--red);    border-color: rgba(239,68,68,.3);  background: rgba(239,68,68,.07); }

/* Header right */
.header-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 20px;
}

.live-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  font-weight: 600;
  color: var(--green);
  letter-spacing: 0.08em;
}

.live-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--green);
  animation: blink 1.8s ease-in-out infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.2; }
}

.demo-chip {
  display: none;
  align-items: center;
  gap: 6px;
  padding: 4px 12px;
  border-radius: 100px;
  background: rgba(245,158,11,.12);
  border: 1px solid rgba(245,158,11,.3);
  color: var(--yellow);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.06em;
}
.demo-chip.visible { display: flex; }

.clock {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 0.04em;
  font-variant-numeric: tabular-nums;
  color: var(--text);
}

.sidebar {
  grid-row: 1 / 3;
  background: var(--surface);
  border-right: 1px solid var(--border-sub);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-label {
  padding: 14px 20px 12px;
  font-size: 10px;
  font-weight: 700;
  color: var(--text-subtle);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  border-bottom: 1px solid var(--border-sub);
  flex-shrink: 0;
}

.server-list {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.server-list::-webkit-scrollbar { width: 3px; }
.server-list::-webkit-scrollbar-track { background: transparent; }
.server-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* Server card */
.srv-card {
  background: var(--surface-2);
  border: 1px solid var(--border-sub);
  border-left: 3px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 13px;
  transition: border-left-color .4s;
}

.srv-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 10px;
}

.srv-info { flex: 1; min-width: 0; }

.srv-name {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  letter-spacing: 0.01em;
}

.srv-sub {
  font-size: 10px;
  color: var(--text-subtle);
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.status-badge {
  flex-shrink: 0;
  font-size: 10px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 100px;
  letter-spacing: 0.08em;
}
.status-badge.online  { background: rgba(34,197,94,.12);  color: var(--green); }
.status-badge.offline { background: rgba(239,68,68,.12);  color: var(--red); }
.status-badge.loading { background: rgba(72,79,88,.15);   color: var(--text-subtle); }

.srv-metrics {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}

.metric-val {
  font-size: 24px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  line-height: 1;
  letter-spacing: -0.02em;
}

.metric-unit {
  font-size: 11px;
  font-weight: 400;
  color: var(--text-muted);
  margin-left: 1px;
}

.metric-lbl {
  font-size: 9px;
  font-weight: 600;
  color: var(--text-subtle);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-top: 2px;
}

.map-area {
  grid-row: 1;
  grid-column: 2;
  position: relative;
  overflow: hidden;
}

#map {
  width: 100%;
  height: 100%;
}

#ping-canvas {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 450;
  pointer-events: none;
}

.leaflet-container { background: var(--bg); }
.leaflet-control-scale-line { background: var(--surface) !important; border-color: var(--border) !important; color: var(--text-muted) !important; }

/* Map legend (bottom-left) */
.map-legend {
  position: absolute;
  bottom: 24px;
  left: 16px;
  z-index: 400;
  background: var(--surface);
  border: 1px solid var(--border-sub);
  border-radius: var(--radius);
  padding: 10px 14px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  letter-spacing: 0.06em;
  display: flex;
  flex-direction: column;
  gap: 8px;
  box-shadow: 0 4px 12px rgba(0,0,0,.4);
}
.map-legend-row {
  display: flex;
  align-items: center;
  gap: 8px;
}
.map-legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
  background: var(--lime);
  opacity: 0.9;
}
.map-legend-dot.offline {
  background: var(--red);
}
.leaflet-control-attribution { display: none !important; }
.leaflet-control-zoom a {
  background: var(--surface) !important;
  color: var(--text) !important;
  border-color: var(--border) !important;
}
.leaflet-control-zoom a:hover {
  background: var(--surface-2) !important;
}

/* Server marker ring animation */
@keyframes ring-out {
  0%   { transform: translate(-50%,-50%) scale(0.4); opacity: 0.8; }
  100% { transform: translate(-50%,-50%) scale(2.8); opacity: 0; }
}
@keyframes offline-blink {
  0%, 100% { opacity: 1; }
  50%      { opacity: 0.2; }
}

/* Popup */
.leaflet-popup-content-wrapper {
  background: var(--surface) !important;
  border: 1px solid var(--border) !important;
  border-radius: 10px !important;
  color: var(--text) !important;
  font-family: var(--font) !important;
  box-shadow: 0 12px 40px rgba(0,0,0,.6) !important;
  padding: 0 !important;
}
.leaflet-popup-content {
  margin: 14px 16px !important;
  width: auto !important;
}
.leaflet-popup-tip-container { display: none; }
.leaflet-popup-close-button { color: var(--text-muted) !important; top: 10px !important; right: 12px !important; }

.popup-name {
  font-size: 14px;
  font-weight: 700;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.popup-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.popup-grid {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 4px 16px;
  font-size: 12px;
}
.popup-key { color: var(--text-muted); }
.popup-val { font-weight: 600; font-variant-numeric: tabular-nums; text-align: right; }

.charts-row {
  grid-row: 2;
  grid-column: 2;
  background: var(--surface);
  border-top: 1px solid var(--border-sub);
  display: grid;
  grid-template-columns: 1fr 1fr 192px;
}

.chart-panel {
  padding: 12px 16px 10px;
  border-right: 1px solid var(--border-sub);
  display: flex;
  flex-direction: column;
  min-height: 0;
  overflow: hidden;
}
.chart-panel:last-child { border-right: none; }

.chart-lbl {
  font-size: 10px;
  font-weight: 700;
  color: var(--text-subtle);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 6px;
  flex-shrink: 0;
}

.chart-wrap {
  flex: 1;
  position: relative;
  min-height: 0;
}

/* Stats panel */
.stats-panel {
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 0;
  padding: 0;
}

.stat-block {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border-bottom: 1px solid var(--border-sub);
  padding: 0 12px;
}
.stat-block:last-child { border-bottom: none; }

.stat-val {
  font-size: 30px;
  font-weight: 800;
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.03em;
  line-height: 1;
}

.stat-lbl {
  font-size: 9px;
  font-weight: 600;
  color: var(--text-subtle);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-top: 4px;
}

.app { position: relative; }
#settings-page {
  display: none;
  position: absolute;
  top: 56px; left: 0; right: 0; bottom: 0;
  background: var(--bg);
  padding: 32px;
  overflow-y: auto;
  z-index: 50;
}
#settings-page.visible { display: block; }
.settings-section { margin-bottom: 32px; }
.settings-section h2 { font-size: 14px; font-weight: 700; color: var(--text-muted); letter-spacing: 0.1em; margin-bottom: 16px; text-transform: uppercase; }
.settings-row { display: flex; gap: 12px; margin-bottom: 12px; align-items: flex-start; }
.settings-row label { flex: 1; min-width: 0; }
.settings-row label span { display: block; font-size: 11px; color: var(--text-subtle); margin-bottom: 4px; }
.settings-row input, .settings-row select { width: 100%; padding: 10px 12px; background: var(--surface-2); border: 1px solid var(--border-sub); border-radius: var(--radius); color: var(--text); font-size: 13px; }
.settings-row input:focus, .settings-row select:focus { outline: none; border-color: var(--blue); }
.settings-row .input-sm { flex: 0 0 100px; }
.settings-row .input-md { flex: 0 0 140px; }
.btn { padding: 10px 16px; border-radius: var(--radius); font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: background .2s, color .2s; }
.btn-primary { background: var(--blue); color: white; }
.btn-primary:hover { background: #2563eb; }
.btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border-sub); }
.btn-ghost:hover { background: var(--surface-2); color: var(--text); }
.btn-danger { background: rgba(239,68,68,.15); color: var(--red); }
.btn-danger:hover { background: rgba(239,68,68,.25); }
.settings-servers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
.settings-server { background: var(--surface-2); border: 1px solid var(--border-sub); border-radius: var(--radius); padding: 12px; display: flex; flex-direction: column; gap: 8px; }
.settings-server-header { display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
.settings-server-name { font-weight: 700; font-size: 13px; }
.settings-server .settings-row { display: flex; flex-wrap: wrap; gap: 8px; margin: 0; }
.settings-server .settings-row label { flex: 1 1 100%; min-width: 0; margin: 0; }
.settings-server .settings-row.row-2 label { flex: 1 1 calc(50% - 4px); min-width: 100px; }
.settings-server .settings-row label.input-sm { flex: 1 1 calc(50% - 4px); min-width: 90px; }
.settings-server input { width: 100%; padding: 6px 10px; font-size: 12px; box-sizing: border-box; }
.settings-server .btn-danger { padding: 6px 10px; font-size: 11px; }
.nav-link { color: var(--blue); text-decoration: none; font-size: 13px; font-weight: 600; }
.nav-link:hover { color: #60a5fa; }
</style>
</head>
<body>

<div class="app">

  <header>
    <a href="#/" class="logo" style="text-decoration:none;color:inherit">
      <div class="logo-mark">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="3" fill="white"/>
          <circle cx="8" cy="8" r="6.5" stroke="white" stroke-width="1.5" stroke-dasharray="3 2"/>
        </svg>
      </div>
      NetWatch
    </a>

    <div class="header-chips">
      <div class="chip" id="chip-online">— / — online</div>
      <div class="chip" id="chip-avg">— ms avg</div>
      <div class="chip" id="chip-jitter">— ms jitter</div>
    </div>

    <div class="header-right">
      <a href="#/settings" class="nav-link" id="nav-settings">Settings</a>
      <div class="demo-chip" id="demo-chip">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><path d="M6 1L7.5 4.5H11L8.25 6.75L9.25 10.5L6 8.5L2.75 10.5L3.75 6.75L1 4.5H4.5Z"/></svg>
        DEMO
      </div>
      <div class="live-badge">
        <div class="live-dot"></div>
        LIVE
      </div>
      <div class="clock" id="clock">--:--:--</div>
    </div>
  </header>

  <div id="dashboard">
  <aside class="sidebar">
    <div class="sidebar-label">Servers</div>
    <div class="server-list" id="server-list">
      <div style="color:var(--text-subtle);font-size:12px;text-align:center;padding:24px 16px">
        Connecting...
      </div>
    </div>
  </aside>

  <main class="map-area">
    <div id="map"></div>
    <canvas id="ping-canvas"></canvas>
    <div class="map-legend" id="map-legend">
      <div class="map-legend-row">
        <span class="map-legend-dot"></span>
        Servers
      </div>
    </div>
  </main>

  <section class="charts-row">
    <div class="chart-panel">
      <div class="chart-lbl">Latency (ms)</div>
      <div class="chart-wrap">
        <canvas id="latencyChart"></canvas>
      </div>
    </div>
    <div class="chart-panel">
      <div class="chart-lbl">Jitter (ms)</div>
      <div class="chart-wrap">
        <canvas id="jitterChart"></canvas>
      </div>
    </div>
    <div class="chart-panel stats-panel">
      <div class="stat-block">
        <div class="stat-val" id="stat-online" style="color:var(--green)">—</div>
        <div class="stat-lbl">Online</div>
      </div>
      <div class="stat-block">
        <div class="stat-val" id="stat-avg">—</div>
        <div class="stat-lbl">Avg latency</div>
      </div>
      <div class="stat-block">
        <div class="stat-val" id="stat-worst" style="color:var(--red)">—</div>
        <div class="stat-lbl">Worst</div>
      </div>
    </div>
  </section>
  </div>

  <div id="settings-page">
    <div class="settings-section">
      <h2>Servers</h2>
      <div class="settings-servers-grid" id="settings-servers"></div>
      <button class="btn btn-ghost" id="btn-add-server" style="margin-top:12px">+ Add server</button>
    </div>
    <div style="margin-top:24px;display:flex;gap:12px;align-items:center">
      <button class="btn btn-primary" id="btn-apply">Apply</button>
      <span id="settings-status" style="font-size:12px;color:var(--text-muted)"></span>
    </div>
  </div>

  <template id="server-form-tpl">
    <div class="settings-server" data-idx="">
      <div class="settings-server-header">
        <span class="settings-server-name"></span>
        <button type="button" class="btn btn-danger" data-action="remove">Remove</button>
      </div>
      <div class="settings-row row-2">
        <label><span>Name</span><input type="text" name="name" placeholder="proxy" required></label>
        <label><span>Host</span><input type="text" name="host" placeholder="192.168.1.1" required></label>
      </div>
      <div class="settings-row">
        <label><span>Location</span><input type="text" name="location" placeholder="Amsterdam, NL"></label>
      </div>
      <div class="settings-row">
        <label class="input-sm"><span>Lat</span><input type="number" step="0.0001" name="lat" placeholder="52.37"></label>
        <label class="input-sm"><span>Lon</span><input type="number" step="0.0001" name="lon" placeholder="4.89"></label>
      </div>
      <div class="settings-row">
        <label><span>Role</span><input type="text" name="role" placeholder="Gateway"></label>
      </div>
    </div>
  </template>

</div>

<script>
const CONFIG = {
  apiUrl: window.location.protocol === 'file:' ? 'http://localhost:5000' : '',
  refreshMs: 10000,
  colors: {},
};

const PALETTE = [
  '#3b82f6','#22c55e','#f59e0b','#a855f7',
  '#06b6d4','#f97316','#ec4899','#14b8a6',
];

let serverOrder  = [];
let serverColors = {};
let firstLoad    = true;
let useDemoData  = false;
let latChart, jitterChart;
const leafletMarkers = {};
let demoHistory = {};

const DEMO_SERVERS = {
  'gateway':  { host:'192.168.1.1',  lat:51.2194, lon:4.4025,  location:'Antwerp, BE', role:'Gateway' },
  'storage':  { host:'192.168.1.10', lat:50.8503, lon:4.3517,  location:'Brussels, BE', role:'Storage' },
  'compute':  { host:'192.168.1.20', lat:50.9333, lon:5.3333,  location:'Hasselt, BE',  role:'Compute' },
};

function makeDemoMetrics() {
  const out = {};
  Object.entries(DEMO_SERVERS).forEach(([name, srv]) => {
    out[name] = {
      ...srv,
      online:       Math.random() > 0.06,
      latency_ms:   +(Math.random() * 60 + 0.4).toFixed(2),
      jitter_ms:    +(Math.random() * 15).toFixed(2),
      last_checked: new Date().toLocaleTimeString('en', {hour:'2-digit',minute:'2-digit'}),
    };
  });
  return out;
}

function initDemoHistory(servers) {
  Object.keys(servers).forEach(name => {
    demoHistory[name] = { timestamps:[], latency:[], jitter:[] };
    for (let i = 0; i < 40; i++) {
      const t = new Date(Date.now() - (40 - i) * 10000);
      demoHistory[name].timestamps.push(t.toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'}));
      demoHistory[name].latency.push(+(Math.random() * 80 + 1).toFixed(2));
      demoHistory[name].jitter.push(+(Math.random() * 18).toFixed(2));
    }
  });
}

function updateDemoHistory(metrics) {
  const now = new Date().toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'});
  Object.entries(metrics).forEach(([name, m]) => {
    if (!demoHistory[name]) demoHistory[name] = {timestamps:[],latency:[],jitter:[]};
    const h = demoHistory[name];
    h.timestamps.push(now);
    h.latency.push(m.latency_ms ?? 0);
    h.jitter.push(m.jitter_ms ?? 0);
    if (h.timestamps.length > 60) { h.timestamps.shift(); h.latency.shift(); h.jitter.shift(); }
  });
}

async function fetchData() {
  try {
    const [metricsRes, historyRes] = await Promise.all([
      fetch(CONFIG.apiUrl + '/api/metrics', { signal: AbortSignal.timeout(3000) }),
      fetch(CONFIG.apiUrl + '/api/history', { signal: AbortSignal.timeout(3000) }),
    ]);
    const metrics = await metricsRes.json();
    const history = await historyRes.json();
    if (useDemoData) { useDemoData = false; document.getElementById('demo-chip').classList.remove('visible'); }
    return { metrics, history };
  } catch {
    useDemoData = true;
    document.getElementById('demo-chip').classList.add('visible');
    if (!Object.keys(demoHistory).length) initDemoHistory(DEMO_SERVERS);
    const metrics = makeDemoMetrics();
    updateDemoHistory(metrics);
    return { metrics, history: demoHistory };
  }
}

function assignColors(names) {
  names.forEach((n, i) => {
    serverColors[n] = CONFIG.colors[n] || PALETTE[i % PALETTE.length];
  });
}

function latColor(ms) {
  if (ms === null || ms === undefined) return 'var(--text-muted)';
  if (ms < 5)   return 'var(--green)';
  if (ms < 50)  return 'var(--lime)';
  if (ms < 100) return 'var(--yellow)';
  if (ms < 250) return 'var(--orange)';
  return 'var(--red)';
}

function fmt(val, dec = 1) {
  if (val === null || val === undefined) return '—';
  return val < 1 ? '<1' : (+val).toFixed(dec);
}

function updateSidebar(metrics) {
  const list = document.getElementById('server-list');
  const count = serverOrder.length;

  const sidebarWidth = count <= 4 ? 296 : count <= 6 ? 360 : count <= 8 ? 400 : 440;
  document.documentElement.style.setProperty('--sidebar-width', sidebarWidth + 'px');
  if (typeof map !== 'undefined') setTimeout(() => map.invalidateSize(), 100);

  serverOrder.forEach(name => {
    const m = metrics[name];
    if (!m) return;
    const sc     = statusColor(m);
    const online = m.online;
    const badge  = online ? 'online' : 'offline';

    let card = document.getElementById('srv-' + name);
    if (!card) {
      card = document.createElement('div');
      card.className = 'srv-card';
      card.id = 'srv-' + name;
      list.appendChild(card);
    }

    card.style.borderLeftColor = sc;
    card.innerHTML = `
      <div class="srv-top">
        <div class="srv-info">
          <div class="srv-name">${name}</div>
          <div class="srv-sub">${m.location || ''}${m.role ? ' · ' + m.role : ''}</div>
          <div class="srv-sub" style="font-variant-numeric:tabular-nums">${m.host}</div>
        </div>
        <span class="status-badge ${badge}">${online ? 'ONLINE' : 'OFFLINE'}</span>
      </div>
      <div class="srv-metrics">
        <div>
          <div class="metric-val" style="color:${latColor(m.latency_ms)}">
            ${fmt(m.latency_ms)}<span class="metric-unit">ms</span>
          </div>
          <div class="metric-lbl">Latency</div>
        </div>
        <div>
          <div class="metric-val" style="color:var(--text-muted)">
            ${fmt(m.jitter_ms)}<span class="metric-unit">ms</span>
          </div>
          <div class="metric-lbl">Jitter</div>
        </div>
      </div>`;
  });
}

function updateHeader(metrics) {
  const all       = Object.values(metrics);
  const online    = all.filter(m => m.online);
  const total     = all.length;
  const latencies = online.map(m => m.latency_ms).filter(x => x !== null);
  const jitters   = online.map(m => m.jitter_ms).filter(x => x !== null);

  const avg   = latencies.length ? (latencies.reduce((a,b)=>a+b,0)/latencies.length).toFixed(1) : null;
  const maxJ  = jitters.length   ? Math.max(...jitters).toFixed(1) : null;
  const worst = latencies.length ? Math.max(...latencies).toFixed(1) : null;

  // Chips
  const chipOnline = document.getElementById('chip-online');
  chipOnline.textContent = `${online.length} / ${total} online`;
  chipOnline.className = 'chip ' + (online.length === total ? 'good' : online.length === 0 ? 'bad' : 'warn');

  const chipAvg = document.getElementById('chip-avg');
  chipAvg.textContent = avg ? `${avg} ms avg` : '— ms avg';

  document.getElementById('chip-jitter').textContent = maxJ ? `${maxJ} ms jitter` : '— ms jitter';

  // Big stats
  document.getElementById('stat-online').textContent = `${online.length}/${total}`;
  document.getElementById('stat-avg').textContent    = avg   ? avg   + ' ms' : '—';
  document.getElementById('stat-worst').textContent  = worst ? worst + ' ms' : '—';
  document.getElementById('stat-worst').style.color  = worst && +worst > 200 ? 'var(--red)' : worst && +worst > 80 ? 'var(--orange)' : 'var(--text-muted)';
}

const map = L.map('map', {
  center: [51.0, 8.0], zoom: 5,
  zoomControl: true, attributionControl: false,
});

L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Dark_Gray_Base/MapServer/tile/{z}/{y}/{x}', {
  maxZoom: 16,
}).addTo(map);

L.control.scale({ imperial: false }).addTo(map);

window.addEventListener('resize', () => map.invalidateSize());

/* Markers */
function statusColor(m) {
  if (!m.online) return '#ef4444';
  if (m.latency_ms !== null && m.latency_ms > 50) return '#f97316';
  return '#22c55e';
}

function makeMarkerIcon(m) {
  const dot = statusColor(m);
  const blink = !m.online ? 'animation:offline-blink 1.2s ease-in-out infinite;' : '';
  const html = `<div style="position:relative;width:12px;height:12px;${blink}">
    <div style="width:12px;height:12px;border-radius:50%;background:${dot}25;border:2px solid ${dot};z-index:2;position:relative"></div>
    <div style="position:absolute;top:50%;left:50%;width:28px;height:28px;border-radius:50%;border:1.5px solid ${dot};opacity:0;animation:ring-out 2.5s ease-out infinite;transform:translate(-50%,-50%)"></div>
  </div>`;
  return L.divIcon({ html, className:'', iconSize:[12,12], iconAnchor:[6,6], popupAnchor:[0,-14] });
}

function makePopup(name, m) {
  const dot = statusColor(m);
  return `<div style="font-family:Inter,sans-serif;min-width:200px">
    <div class="popup-name">
      <span class="popup-dot" style="background:${dot}"></span>${name}
      ${m.role ? `<span style="font-size:10px;color:var(--text-muted);font-weight:500">${m.role}</span>` : ''}
    </div>
    <div class="popup-grid">
      <span class="popup-key">Host</span><span class="popup-val">${m.host}</span>
      <span class="popup-key">Location</span><span class="popup-val">${m.location || '—'}</span>
      <span class="popup-key">Status</span>
        <span class="popup-val" style="color:${m.online ? 'var(--green)':'var(--red)'}">
          ${m.online ? 'ONLINE' : 'OFFLINE'}
        </span>
      <span class="popup-key">Latency</span><span class="popup-val">${fmt(m.latency_ms)} ms</span>
      <span class="popup-key">Jitter</span><span class="popup-val">${fmt(m.jitter_ms)} ms</span>
      <span class="popup-key">Last check</span><span class="popup-val">${m.last_checked || '—'}</span>
    </div>
  </div>`;
}

function updateMarkers(metrics) {
  const bounds = [];
  Object.entries(metrics).forEach(([name, m]) => {
    if (!m.lat || !m.lon) return;
    const icon = makeMarkerIcon(m);
    const sc   = statusColor(m);
    bounds.push([m.lat, m.lon]);

    if (leafletMarkers[name]) {
      leafletMarkers[name].setIcon(icon);
      leafletMarkers[name].setPopupContent(makePopup(name, m));
    } else {
      leafletMarkers[name] = L.marker([m.lat, m.lon], { icon })
        .bindPopup(makePopup(name, m), { maxWidth: 260, className: '' })
        .addTo(map);
    }

  });

  if (firstLoad && bounds.length > 1) {
    map.fitBounds(bounds, { padding: [60, 60] });
  } else if (firstLoad && bounds.length === 1) {
    map.setView(bounds[0], 10);
  }
}

function buildDatasets(history, key, fill) {
  return serverOrder.filter(n => history[n]).map(name => ({
    label:           name,
    data:            history[name]?.[key] ?? [],
    borderColor:     serverColors[name],
    backgroundColor: fill ? serverColors[name] + '14' : 'transparent',
    borderWidth: 1.5,
    pointRadius: 0,
    tension: 0.4,
    fill,
  }));
}

function initCharts(history) {
  const labels = history[serverOrder.find(n => history[n])]?.timestamps ?? [];

  latChart = new Chart(document.getElementById('latencyChart'), {
    type: 'line',
    data: { labels, datasets: buildDatasets(history, 'latency', true) },
    options: { ...BASE_CHART_OPTS },
  });

  jitterChart = new Chart(document.getElementById('jitterChart'), {
    type: 'line',
    data: { labels, datasets: buildDatasets(history, 'jitter', false) },
    options: {
      ...BASE_CHART_OPTS,
      plugins: { ...BASE_CHART_OPTS.plugins, legend: { display: false } },
    },
  });
}

function updateCharts(history) {
  if (!latChart || !jitterChart) return;
  const labels = history[serverOrder.find(n => history[n])]?.timestamps ?? [];

  [latChart, jitterChart].forEach((chart, ci) => {
    const key = ci === 0 ? 'latency' : 'jitter';
    chart.data.labels = labels;
    chart.data.datasets.forEach((ds, i) => {
      const name = serverOrder.filter(n => history[n])[i];
      ds.data = history[name]?.[key] ?? [];
    });
    chart.update('none');
  });
}

setInterval(() => {
  document.getElementById('clock').textContent =

document.getElementById('clock').textContent = new Date().toLocaleTimeString('en');

/* ═══════════════════════════════════════════════════════
   Ping/Pong Visual — canvas overlay on Leaflet map
   ═══════════════════════════════════════════════════════ */
const pingVis = (function() {
  const canvas = document.getElementById('ping-canvas');
  const ctx = canvas.getContext('2d');

  const TRAIL_SPEED   = 0.02;
  const FADE_SPEED    = 0.025;
  const ARC_HEIGHT    = 0.30;
  const PING_COLOR    = '#22c55e';
  const PONG_COLOR    = '#06b6d4';

  let trails = [];
  let ghosts = {};
  let prevOnline = {};
  let hubName = null;
  let running = false;

  function resizeCanvas() {
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width  = rect.width  * devicePixelRatio;
    canvas.height = rect.height * devicePixelRatio;
    canvas.style.width  = rect.width  + 'px';
    canvas.style.height = rect.height + 'px';
    ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  }

  function serverToPixel(name, metrics) {
    const m = metrics[name];
    if (!m || !m.lat || !m.lon) return null;
    const mapEl = document.getElementById('map');
    const mapRect = mapEl.getBoundingClientRect();
    const canvasRect = canvas.parentElement.getBoundingClientRect();
    const pt = map.latLngToContainerPoint([m.lat, m.lon]);
    return { x: pt.x + (mapRect.left - canvasRect.left), y: pt.y + (mapRect.top - canvasRect.top) };
  }

  function findHub(metrics) {
    const names = Object.keys(metrics);
    const gateway = names.find(n => (metrics[n].role || '').toLowerCase() === 'gateway');
    if (gateway) return gateway;
    if (metrics['hub']) return 'hub';
    return names[0] || null;
  }

  function ctrlPoint(from, to) {
    const mx = (from.x + to.x) / 2;
    const my = (from.y + to.y) / 2;
    const d  = Math.hypot(to.x - from.x, to.y - from.y);
    if (d === 0) return { x: mx, y: my - 40 };
    const px = -(to.y - from.y) / d;
    const py =  (to.x - from.x) / d;
    return { x: mx + px * d * ARC_HEIGHT, y: my + py * d * ARC_HEIGHT - d * ARC_HEIGHT * 0.4 };
  }

  function bezier(t, a, c, b) {
    const u = 1 - t;
    return { x: u*u*a.x + 2*u*t*c.x + t*t*b.x, y: u*u*a.y + 2*u*t*c.y + t*t*b.y };
  }

  function drawArc(from, ctrl, to, maxT, color, width, alpha) {
    if (maxT <= 0 || alpha <= 0) return;
    ctx.save();
    ctx.strokeStyle = color;
    ctx.lineWidth = width;
    ctx.globalAlpha = alpha;
    ctx.lineCap = 'round';
    ctx.shadowBlur = 8;
    ctx.shadowColor = color;
    ctx.beginPath();
    const steps = 30;
    const s = bezier(0, from, ctrl, to);
    ctx.moveTo(s.x, s.y);
    for (let i = 1; i <= steps; i++) {
      const t = Math.min((i / steps) * maxT, maxT);
      const p = bezier(t, from, ctrl, to);
      ctx.lineTo(p.x, p.y);
    }
    ctx.stroke();
    ctx.restore();
  }

  function drawHead(pos, color, alpha) {
    ctx.save();
    ctx.globalAlpha = alpha;
    const g = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, 14);
    g.addColorStop(0, color);
    g.addColorStop(0.5, color + '80');
    g.addColorStop(1, 'transparent');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, 14, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.globalAlpha = alpha * 0.9;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function firePings(metrics) {
    hubName = findHub(metrics);
    if (!hubName) return;
    const hubPx = serverToPixel(hubName, metrics);
    if (!hubPx) return;

    Object.keys(metrics).forEach(name => {
      if (name === hubName) return;
      const px = serverToPixel(name, metrics);
      if (!px) return;
      const ctrl = ctrlPoint(hubPx, px);
      trails.push({
        from: {...hubPx}, to: {...px}, ctrl,
        type: 'ping', server: name,
        progress: 0, opacity: 1, state: 'flying'
      });
    });

    Object.keys(metrics).forEach(name => {
      const online = metrics[name].online;
      if (online && !prevOnline[name]) {
        delete ghosts[name];
      }
      if (!online && name !== hubName) {
        if (!ghosts[name]) {
          ghosts[name] = { since: Date.now() };
        }
      } else {
        delete ghosts[name];
      }
      prevOnline[name] = online;
    });
  }

  function animate(metrics) {
    resizeCanvas();
    ctx.clearRect(0, 0, canvas.width / devicePixelRatio, canvas.height / devicePixelRatio);

    if (!hubName) return;
    const hubPx = serverToPixel(hubName, metrics);
    if (!hubPx) return;

    Object.entries(ghosts).forEach(([name, ghost]) => {
      const px = serverToPixel(name, metrics);
      if (!px) return;
      const age = Date.now() - ghost.since;
      let color, width, alpha;
      if (age < 30000)      { color = '#666'; width = 1.5; alpha = 0.35; }
      else if (age < 60000) { color = '#ff8800'; width = 2.5; alpha = 0.5; }
      else {
        color = '#ff3333';
        width = 3 + Math.min((age - 60000) / 30000, 2);
        const pulse = 0.5 + 0.5 * Math.sin(Date.now() / 400);
        alpha = 0.4 + pulse * 0.5;
      }
      const ctrl = ctrlPoint(hubPx, px);
      ctx.save();
      ctx.setLineDash([8, 8]);
      ctx.lineDashOffset = -Date.now() / 60;
      drawArc(hubPx, ctrl, px, 1, color, width, alpha);
      ctx.restore();
    });

    trails = trails.filter(t => {
      const from = t.from, to = t.to, ctrl = t.ctrl;
      if (t.state === 'flying') {
        t.progress += TRAIL_SPEED;
        if (t.progress >= 1) {
          t.progress = 1;
          t.state = 'arrived';
        }
      }
      if (t.state === 'arrived') {
        if (t.type === 'ping' && metrics[t.server]?.online) {
          const srvPx = serverToPixel(t.server, metrics);
          if (srvPx && hubPx) {
            const pongCtrl = ctrlPoint(srvPx, hubPx);
            trails.push({
              from: {...srvPx}, to: {...hubPx}, ctrl: pongCtrl,
              type: 'pong', server: t.server,
              progress: 0, opacity: 1, state: 'flying'
            });
          }
        }
        t.state = 'fading';
      }
      if (t.state === 'fading') {
        t.opacity -= FADE_SPEED;
      }
      if (t.opacity <= 0) return false;

      const color = t.type === 'ping' ? PING_COLOR : PONG_COLOR;
      const w = t.type === 'ping' ? 2.5 : 2;
      drawArc(from, ctrl, to, Math.min(t.progress, 1), color, w, t.opacity * 0.6);

      if (t.state === 'flying') {
        const hp = bezier(t.progress, from, ctrl, to);
        drawHead(hp, color, t.opacity);
      }
      return true;
    });
  }

  let lastMetrics = {};
  function setMetrics(m) { lastMetrics = m; }

  function loop() {
    animate(lastMetrics);
    requestAnimationFrame(loop);
  }

  function start() {
    if (running) return;
    running = true;
    resizeCanvas();
    loop();
  }

  window.addEventListener('resize', resizeCanvas);
  map.on('move zoom resize', resizeCanvas);

  return { firePings, setMetrics, start };
})();

async function refresh() {
  const { metrics, history } = await fetchData();

  if (firstLoad) {
    serverOrder = Object.keys(metrics);
    assignColors(serverOrder);
    document.getElementById('server-list').innerHTML = '';

    updateMarkers(metrics);
    updateSidebar(metrics);
    updateHeader(metrics);
    initCharts(history);
    pingVis.setMetrics(metrics);
    pingVis.start();
    pingVis.firePings(metrics);
    firstLoad = false;
  } else {
    updateMarkers(metrics);
    updateSidebar(metrics);
    updateHeader(metrics);
    updateCharts(history);
    pingVis.setMetrics(metrics);
    pingVis.firePings(metrics);
  }
}

refresh();
setInterval(refresh, CONFIG.refreshMs);

(function() {
  const api = CONFIG.apiUrl;
  let settingsData = { servers: [], connections: [] };

  function route() {
    const isSettings = location.hash === '#/settings';
    const nav = document.getElementById('nav-settings');
    document.getElementById('dashboard').style.display = isSettings ? 'none' : 'grid';
    document.getElementById('settings-page').classList.toggle('visible', isSettings);
    if (isSettings) {
      nav.href = '#/';
      nav.textContent = 'Home';
      loadSettings();
    } else {
      nav.href = '#/settings';
      nav.textContent = 'Settings';
      if (typeof map !== 'undefined') setTimeout(() => map.invalidateSize(), 100);
    }
  }

  async function loadSettings() {
    try {
      const r = await fetch(api + '/api/config');
      settingsData = await r.json();
      renderSettings();
    } catch (e) {
      document.getElementById('settings-status').textContent = 'Could not load config: ' + e.message;
    }
  }

  function renderSettings() {
    const tpl = document.getElementById('server-form-tpl');
    const wrap = document.getElementById('settings-servers');
    wrap.innerHTML = '';
    settingsData.servers.forEach((srv, i) => {
      const el = tpl.content.cloneNode(true);
      const div = el.querySelector('.settings-server');
      div.dataset.serverKey = (srv.name || '').trim() || `__new_${i}_${Date.now()}`;
      div.querySelector('.settings-server-name').textContent = srv.name || 'New server';
      div.querySelector('[name="name"]').value = srv.name || '';
      div.querySelector('[name="host"]').value = srv.host || '';
      div.querySelector('[name="location"]').value = srv.location || '';
      div.querySelector('[name="lat"]').value = srv.lat ?? '';
      div.querySelector('[name="lon"]').value = srv.lon ?? '';
      div.querySelector('[name="role"]').value = srv.role || '';
      div.querySelector('[name="name"]').addEventListener('input', e => { div.querySelector('.settings-server-name').textContent = e.target.value || 'New server'; });
      wrap.appendChild(el);
    });
  }

  document.getElementById('settings-servers').addEventListener('click', (e) => {
    const btn = e.target.closest('[data-action="remove"]');
    if (!btn) return;
    e.preventDefault();
    const card = btn.closest('.settings-server');
    if (!card) return;
    const key = card.dataset.serverKey;
    if (!key) return;
    const removeIdx = key.startsWith('__new_')
      ? parseInt(key.split('_')[2], 10)
      : settingsData.servers.findIndex(s => (s.name || '').trim() === key);
    if (removeIdx >= 0) {
      settingsData.servers.splice(removeIdx, 1);
      renderSettings();
    }
  });

  document.getElementById('btn-add-server').addEventListener('click', () => {
    settingsData.servers.push({ name: '', host: '', location: '', lat: '', lon: '', role: '' });
    renderSettings();
  });

  function getServersFromForm() {
    return Array.from(document.querySelectorAll('#settings-servers .settings-server')).map(div => ({
      name: (div.querySelector('[name="name"]')?.value || '').trim(),
      host: (div.querySelector('[name="host"]')?.value || '').trim(),
      location: (div.querySelector('[name="location"]')?.value || '').trim(),
      lat: parseFloat(div.querySelector('[name="lat"]')?.value) || null,
      lon: parseFloat(div.querySelector('[name="lon"]')?.value) || null,
      role: (div.querySelector('[name="role"]')?.value || '').trim(),
    }));
  }

  document.getElementById('btn-apply').addEventListener('click', async () => {
    const all = getServersFromForm();
    const servers = all.filter(s => s.name && s.host);
    if (all.some(s => (s.name || s.host) && (!s.name || !s.host))) {
      document.getElementById('settings-status').textContent = 'Each server must have a name and host.';
      return;
    }
    if (servers.length === 0) {
      document.getElementById('settings-status').textContent = 'Add at least one server.';
      return;
    }
    const connections = [];
    const status = document.getElementById('settings-status');
    status.textContent = 'Saving...';
    try {
      const r = await fetch(api + '/api/config', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ servers, connections }),
      });
      const data = await r.json();
      if (!r.ok) throw new Error(data.error || 'Error');
      status.textContent = 'Saved! Reloading...';
      setTimeout(() => { location.hash = '#/'; location.reload(); }, 500);
    } catch (e) {
      status.textContent = 'Error: ' + e.message;
    }
  });

  window.addEventListener('hashchange', route);
  route();
})();
